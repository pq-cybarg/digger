id: CMMC_2_0
title: Cybersecurity Maturity Model Certification 2.0
version: "2.0"
publisher: U.S. Department of Defense (CMMC PMO)
url: https://dodcio.defense.gov/CMMC/
description: |
  DoD's three-level maturity model for protecting Federal Contract
  Information (FCI) and Controlled Unclassified Information (CUI).
  Level 1 = 15 basic safeguards (FAR 52.204-21). Level 2 = 110 controls
  aligned to NIST 800-171. Level 3 = additional 800-172 controls.

controls:
  # Level 1 (FCI basics)
  - id: AC.L1-3.1.1
    title: Limit information system access to authorized users
    family: AC
    severity_if_failed: high
    checks:
      - artifact_present: users
  - id: AC.L1-3.1.2
    title: Limit information system access to types of transactions/functions that authorized users are permitted to execute
    family: AC
    severity_if_failed: high
    checks: [{manual: true}]
  - id: AC.L1-3.1.20
    title: Verify and control/limit connections to and use of external information systems
    family: AC
    severity_if_failed: medium
    checks:
      - artifact_present: network
  - id: IA.L1-3.5.1
    title: Identify information system users
    family: IA
    severity_if_failed: high
    checks:
      - artifact_present: users
  - id: SI.L1-3.14.1
    title: Identify, report, and correct information and information system flaws in a timely manner
    family: SI
    severity_if_failed: high
    checks:
      - no_finding_with_detector: supply_chain
  - id: SI.L1-3.14.2
    title: Provide protection from malicious code at appropriate locations
    family: SI
    severity_if_failed: high
    checks:
      - no_finding_with_detector: yara
      - no_finding_with_detector: c2

  # Level 2 (CUI)
  - id: AU.L2-3.3.1
    title: Create and retain system audit logs
    family: AU
    severity_if_failed: high
    checks:
      - artifact_present: windows.event_logs
      - artifact_present: linux.audit
      - artifact_present: macos.unified_logs
  - id: AU.L2-3.3.5
    title: Correlate audit record review, analysis, and reporting processes
    family: AU
    severity_if_failed: medium
    checks: [{manual: true}]
  - id: CM.L2-3.4.1
    title: Establish and maintain baseline configurations and inventories of organizational systems
    family: CM
    severity_if_failed: medium
    checks:
      - artifact_present: installed_software
  - id: CM.L2-3.4.6
    title: Employ the principle of least functionality by configuring systems to provide only essential capabilities
    family: CM
    severity_if_failed: medium
    checks:
      - no_finding_with_detector: persistence_outlier
  - id: IR.L2-3.6.2
    title: Track, document, and report incidents to designated officials/authorities
    family: IR
    severity_if_failed: high
    checks: [{manual: true}]
  - id: SI.L2-3.14.6
    title: Monitor organizational systems, including inbound and outbound communications traffic
    family: SI
    severity_if_failed: high
    checks:
      - artifact_present: processes
      - artifact_present: network
