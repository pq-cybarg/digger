# MITRE ATT&CK Enterprise — technique → tactic map.
#
# Seeded from the MITRE Enterprise matrix (v16). Many techniques are
# multi-tactic; we list every tactic the technique appears under in the
# official kill_chain_phases list.
#
# This is the *fallback* corpus. When digger.intel.sources.mitre_attack
# is extended to surface tactic info, that live cache overrides this
# file per-technique.
#
# Coverage focus: only techniques and sub-techniques referenced by at
# least one current digger detector's to_sigma_template() tags or
# per-finding Sigma output. Adding a new detector that emits a new
# tag means appending its (id: [tactic, ...]) line here.

# live-first-ok: Mitre publishes ATT&CK on a 6-month cadence as STIX 2.1;
# the live mitre_attack feed already pulls the bundle but currently
# extracts only actor/group info. When the feed is extended to surface
# kill_chain_phases per technique, _load_tactic_map() will overlay
# that on top of this bundled file.

