# Known-malicious or compromised package versions, ecosystem -> [pkg@version, ...]
#
# Non-exhaustive. Aggregates from:
#   - OpenSSF malicious-packages dataset
#   - PyPI / npm public security advisories (GHSA)
#   - Socket.dev / Phylum / Snyk advisories
#   - Anchore / Sonatype OSS index excerpts
#
# This file is intentionally easy to update — drop new lines and the
# supply-chain detector picks them up on next run.

npm:
  - "event-stream@3.3.6"           # Copay incident
  - "flatmap-stream@*"             # Bundled with above
  - "eslint-scope@3.7.2"           # 2018 token-theft attack
  - "eslint-config-eslint@5.0.2"
  - "rc@1.2.9"
  - "rc@1.3.9"
  - "rc@2.3.9"
  - "node-ipc@10.1.1"              # protestware in 2022
  - "node-ipc@10.1.2"
  - "ua-parser-js@0.7.29"          # 2021 cryptostealer
  - "ua-parser-js@0.8.0"
  - "ua-parser-js@1.0.0"
  - "coa@2.0.3"
  - "coa@2.0.4"
  - "coa@2.1.1"
  - "coa@2.1.3"
  - "coa@3.0.1"
  - "coa@3.1.3"
  - "rc@1.2.9"
  - "tslib@2.4.0-deno"             # known-typosquat pattern
  # NOTE: @types/web is a legitimate Microsoft DefinitelyTyped package
  # (the WebIDL types for the Web API), widely used. It was mistakenly
  # listed here in an earlier seed; do not re-add without an actual
  # advisory referencing a compromised version.
  - "duckduckgo-mcp-server@*"      # 2025 MCP typosquats
pypi:
  - "ctx@0.2.2"                    # 2022 ctx hijack
  - "ctx@0.2.3"
  - "ctx@0.2.4"
  - "phpass@1.2.0"
  - "phpass@1.2.1"
  - "phpass@1.2.2"
  - "phpass@1.2.3"
  - "discordsafety@*"
  - "pythonkafka@*"                # typosquat of confluent-kafka
  - "djanga@*"                     # typosquat
  - "requesys@*"                   # typosquat
  - "urllib@*"                     # typosquat of urllib3 (urllib is stdlib)
  - "request@*"                    # typosquat of requests
  - "colorama@0.4.7"               # if you see this version it's a typosquat clone
gems:
  - "rest-client@1.6.13"           # known compromised version
  - "rest-client@1.7.0"
  - "rest-client@1.7.1"
  - "rest-client@1.8.0"
