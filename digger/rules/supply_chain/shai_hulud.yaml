# Shai-Hulud npm supply-chain worm indicators.
#
# The Shai-Hulud campaign (first wave September 2025) is a self-replicating
# npm worm that compromises maintainer accounts, publishes malicious package
# versions, harvests credentials via TruffleHog, and drops a GitHub Actions
# workflow into any repos it can write to that re-publishes itself.
#
# References:
#   - StepSecurity advisory: https://www.stepsecurity.io/blog/ctrl-tinycolor-and-40-npm-packages-compromised
#   - Aikido report (compromised package list)
#   - Socket.dev / Snyk advisories on first/second waves
#
# This list is necessarily incomplete and grows. Keep it updated; the
# detector also flags by behavioral patterns (workflow file name, hex
# webhook URL, TruffleHog bundle.js) so version-list misses are partially
# backstopped.
#
# Format: each entry is a "package@version" pair (or a "package@*" wildcard).

worm_workflow_filename: "shai-hulud-workflow.yml"
worm_artifact_repos:
  - "shai-hulud"
  - "Shai-Hulud Migration"
worm_webhook_patterns:
  # webhook.site exfil host used in the first wave
  - "webhook\\.site/[a-f0-9-]{30,}"
# Markers fall into two tiers — single-hit-fires vs. need-co-occurrence.
# Lessons learned that drove this split:
#   * GITHUB_TOKEN / NPM_TOKEN appear in every CI workflow ever written.
#     Never put them here.
#   * `trufflehog` appears in the worm's bundle.js (used internally for
#     credential harvest) BUT ALSO in many legitimate defensive workflows
#     that just invoke the open-source TruffleHog scanner. A workflow
#     that *runs* TruffleHog is not the worm.
#   * `shai-hulud` appears in the worm AND in legitimate defensive
#     documentation / hardening checks ("detect Shai-Hulud-class …").
#     Documentation is not the worm.
#
# Detector logic:
#   * unambiguous marker → critical
#   * suggestive marker  → critical ONLY when co-occurring with an
#                          unambiguous marker or a webhook exfil URL.
#                          Alone, it's likely defensive tooling.

worm_unambiguous_markers:
  - "shai-hulud-workflow"   # the worm's literal self-referenced filename
  - "Shai-Hulud Migration"  # the worm's literal commit-message constant

worm_suggestive_markers:
  - "trufflehog"
  - "shai-hulud"

# Back-compat: detectors that read the old field still get something
# sensible. Keep it pointed at the unambiguous set.
worm_strong_markers:
  - "shai-hulud-workflow"
  - "Shai-Hulud Migration"

# Documented but currently unused by the detector — too noisy alone.
# Kept here so the corpus stays self-describing.
worm_weak_markers:
  - "GITHUB_TOKEN"
  - "NPM_TOKEN"
  - "AWS_ACCESS_KEY_ID"

# Compromised package versions — non-exhaustive snapshot from the first
# and second waves. Update from the upstream advisories.
