# TrapDoor crypto-stealer supply-chain campaign.
#
# Disclosed: 2026-05-24 by Socket Security
#   https://socket.dev/blog/trapdoor-crypto-stealer-npm-pypi-crates
#
# Attribution: GitHub account ``ddjidd564`` (Socket published; no
# nation-state or established threat-group attribution at time of
# disclosure).
#
# Campaign: 34 malicious packages across npm (21), PyPI (7),
# crates.io (6). Targets crypto / DeFi / AI / security developers.
# Exfil targets include: SSH keys, Sui/Solana/Aptos wallet data, AWS
# credentials, GitHub tokens, browser profiles + login databases,
# crypto wallet extensions, env vars, API keys.
#
# Persistence: drops payload references into developer-host files
# that survive reboot — .cursorrules, CLAUDE.md, git hooks, shell
# hooks, systemd user units, cron, plus SSH-based propagation to
# adjacent hosts via authorized_keys reuse.
#
# Detection bypass: average 5m 56s before flagged; fastest 58s.
# Treat all matched versions as compromised regardless of release
# date; the campaign re-publishes under existing version numbers.

# live-first-ok: Socket Security publishes this corpus on their blog,
# not as a machine-readable live feed. If they expose a STIX / OSV
# endpoint later, switch to load_intel() with this file as fallback
# per digger's live-first convention.

source: "socket.dev"
disclosed: "2026-05-24"
campaign: "TrapDoor"
attribution:
  github_account: "ddjidd564"

# Exact package@version pairs. Any version of these packages is
# considered compromised — TrapDoor re-publishes existing versions.
# Format: "name@*" means every version.

npm:
